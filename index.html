<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijiazhuang Rufang Technology Co., Ltd. | PollyPop Games</title>
    <style>
        /* 1. 设置从左到右的线性渐变背景 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(to right, #aadd55 0%, #77bb33 100%);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* 2. 主体展示区域 - 左对齐 */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直居中，若要置顶可改为 flex-start */
            align-items: flex-start; /* 核心：水平左对齐 */
            padding-left: 10%; /* 左侧留出页边距，模拟截图感 */
            padding-right: 20px;
        }

        /* 放置你上传的两个 PNG 图片 */
        .brand-assets {
            display: flex;
            align-items: center;
            gap: 15px; /* 叶子和鹦鹉的间距 */
            margin-bottom: 15px;
        }

        .brand-logo {
            height: 120px; /* 调整图片高度 */
            width: auto;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
            text-align: left;
        }

        .tagline {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.9;
            margin-top: 5px;
            text-align: left;
        }

        /* 3. 底部深色信息栏 - 文字左对齐 */
        footer {
            background-color: #1a1a2e;
            padding: 30px 10%; /* 保持与上方一致的左缩进 */
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .legal-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-details {
            opacity: 0.7;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero { padding-left: 20px; }
            footer { padding-left: 20px; }
            h1 { font-size: 2.5rem; }
            .brand-logo { height: 80px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="brand-assets">
            <!-- 确保文件名与你上传的 Bird.png 和 Leaves.png 完全一致 -->
            <img src="Leaves.png" alt="Leaf" class="brand-logo">
            <img src="Bird.png" alt="Bird" class="brand-logo">
        </div>
        
        <h1>PollyPop Games</h1>
        <p class="tagline">Innovating the Future of Casual Gaming</p>
    </div>

    <footer>
        <div class="legal-name">SHIJIAZHUANG RUFANG TECHNOLOGY CO., LTD.</div>
        <div class="contact-details">
            <!-- 重要：请在此处填入你邓白氏注册的英文详细地址 -->
            Address: 699429736 <br>
            Email: tabriswx@gmail.com
        </div>
    </footer>

</body>
</html>
