<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijiazhuang Rufang Technology Co., Ltd. | PollyPop Games</title>
    <style>
        /* 1. 设置从左到右的线性渐变背景 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(to right, #aadd55 0%, #77bb33 100%);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* 2. 主体展示区域 - 左对齐 */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; 
            padding-left: 12%; 
            padding-top: 50px;
        }

        /* 品牌元素容器 */
        .brand-container {
            position: relative;
            margin-bottom: -15px; /* 压住下方文字顶部 */
            padding-left: 10px;
        }

        /* 叶子：放在 O 的左上方，使用原始尺寸感 */
        .leaf {
            height: 60px;
            width: auto;
            position: absolute;
            left: 20px;
            top: -35px;
            opacity: 0.9;
        }

        /* 鹦鹉：精准对齐在第一个 P 上方 */
        .bird {
            height: 85px;
            width: auto;
            position: relative;
            left: 105px; 
            z-index: 2;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            font-weight: 800; /* 极粗 */
            letter-spacing: -2px; /* 紧凑间距 */
            line-height: 0.9;
        }

        .tagline {
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold; /* 加粗 */
            letter-spacing: 0.5px; /* 紧凑间距 */
            opacity: 0.95;
            margin-top: 10px;
            padding-left: 5px;
        }

        /* 3. 底部信息栏 - 浅蓝色文字 */
        footer {
            background-color: #1a1a2e;
            padding: 40px 12%;
            text-align: left;
            color: #d1e8ff; /* 浅蓝色文字 */
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .legal-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #ffffff; /* 公司全称保持白色，更醒目 */
        }

        .contact-details {
            opacity: 0.8;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .hero { padding-left: 30px; }
            footer { padding-left: 30px; }
            h1 { font-size: 3rem; }
            .bird { height: 60px; left: 60px; }
            .leaf { height: 40px; left: 10px; top: -20px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="brand-container">
            <!-- 确保文件名与你上传的 Bird.png 和 Leaves.png 完全一致 -->
            <img src="Leaves.png" alt="Leaf" class="leaf">
            <img src="Bird.png" alt="Bird" class="bird">
        </div>
        
        <h1>PollyPop Games</h1>
        <p class="tagline">INNOVATING THE FUTURE OF CASUAL GAMING</p>
    </div>

    <footer>
        <div class="legal-name">SHIJIAZHUANG RUFANG TECHNOLOGY CO., LTD.</div>
        <div class="contact-details">
            <!-- 已将 D-U-N-S 编号加入此处 -->
            D-U-N-S Number: 699429736 <br>
            Address: [Your D-U-N-S Registered English Address] <br>
            Email: tabriswx@gmail.com
        </div>
    </footer>

</body>
</html>
