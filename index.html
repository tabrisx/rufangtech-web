<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijiazhuang Rufang Technology Co., Ltd. | PollyPop Games</title>
    <style>
        /* 1. 还原图片中的绿色渐变背景 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #aadd55 0%, #77bb33 100%);
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* 2. 主体展示区域 */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* 放置你上传的鹦鹉和叶子 logo.png */
        .brand-logo {
            width: 150px; /* 根据需要调整大小 */
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* 3. 底部深蓝色信息栏 */
        footer {
            background-color: #1a1a2e; /* 还原图片底部色块 */
            padding: 25px 20px;
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .legal-name {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .contact-details {
            opacity: 0.7;
        }

        /* 移动端自动缩放 */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .brand-logo { width: 100px; }
            footer { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <!-- 这里引用你上传到 GitHub 的透明 PNG 图片 -->
        <img src="logo.png" alt="PollyPop Games Logo" class="brand-logo">
        
        <h1>PollyPop Games</h1>
        <p class="tagline">Innovating the Future of Casual Gaming</p>
    </div>

    <footer>
        <div class="legal-name">SHIJIAZHUANG RUFANG TECHNOLOGY CO., LTD.</div>
        <div class="contact-details">
            <!-- 关键：请在此处填入你邓白氏注册的英文地址 -->
            Address: [699429736] <br>
            Email: tabriswx@gmail.com
        </div>
    </footer>

</body>
</html>
