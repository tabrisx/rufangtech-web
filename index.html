<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijiazhuang Rufang Technology Co., Ltd. | PollyPop Games</title>
    <style>
        /* 1. 基础样式与渐变背景 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            background: linear-gradient(to right, #98e154 0%, #bcde68 100%);
            display: flex;
            flex-direction: column;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 18%; 
        }

        /* 2. 品牌元素定位容器 */
        .brand-container {
            position: relative;
            margin-bottom: -15px; 
        }

        /* 叶子：精确位于第一个小写 'o' 的头顶 */
        .leaf {
            height: 30px;
            width: auto;
            position: absolute;
            left: 110px; 
            top: 45px;
            z-index: 1;
        }

        /* 鹦鹉：精确位于第二个大写 'P' 的头顶，位置上移 15px (从 5px 变更为 -10px) */
        .bird {
            height: 88px;
            width: auto;
            position: relative;
            left: 242px; 
            top: -10px; /* 调整后的位置 */
            z-index: 2;
        }

        h1 {
            font-size: 5.8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -3.5px; 
            line-height: 0.8;
            transform: scaleX(1.05); 
            transform-origin: left;
        }

        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0px; 
            opacity: 1;
            margin-top: 20px;
            padding-left: 2px;
        }

        /* 3. 底部信息栏 - 深蓝底与浅蓝字 */
        footer {
            background-color: #1c1c4b;
            padding: 35px 18%;
            text-align: left;
            color: #a9b8d2; 
            font-size: 0.85rem;
            line-height: 2;
        }

        .legal-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #ffffff;
        }

        /* 响应式处理 */
        @media (max-width: 768px) {
            .hero { padding-left: 10%; }
            footer { padding-left: 10%; }
            h1 { font-size: 3rem; }
            .bird { height: 50px; left: 125px; top: -5px; }
            .leaf { height: 18px; left: 58px; top: 25px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="brand-container">
            <img src="Leaves.png" alt="Leaf" class="leaf">
            <img src="Bird.png" alt="Bird" class="bird">
        </div>
        
        <h1>PollyPop Games</h1>
        <p class="tagline">INNOVATING THE FUTURE OF CASUAL GAMING</p>
    </div>

    <footer>
        <div class="legal-name">SHIJIAZHUANG RUFANG TECHNOLOGY CO., LTD.</div>
        <div class="contact-details">
            D-U-N-S: 699429736 &nbsp;&nbsp;&nbsp; Email: tabriswx@gmail.com <br>
            Address: [填入你的邓白氏注册英文详细地址]
        </div>
    </footer>

</body>
</html>
