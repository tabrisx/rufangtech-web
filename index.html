<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shijiazhuang Rufang Technology Co., Ltd. | PollyPop Games</title>
    <style>
        /* 1. 精准吸色：嫩绿到草绿的横向渐变 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            background: linear-gradient(to right, #98e154 0%, #bcde68 100%);
            display: flex;
            flex-direction: column;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 15%; 
        }

        /* 2. 品牌元素：像素级对齐 */
        .brand-container {
            position: relative;
            margin-bottom: -15px; /* 让图标与文字无缝衔接 */
            margin-left: 45px;
        }

        /* 叶子：缩小并移动到 P 的左肩 */
        .leaf {
            height: 30px; /* 进一步缩小 */
            width: auto;
            position: absolute;
            left: -18px;
            top: 42px;
            z-index: 1;
        }

        /* 鹦鹉：精准落在第一个 P 的头顶 */
        .bird {
            height: 92px;
            width: auto;
            position: relative;
            left: 52px; 
            z-index: 2;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -4px; /* 极紧凑的字母间距 */
            line-height: 0.8;
            transform: scaleX(1.05); /* 稍微拉宽字体 */
            transform-origin: left;
        }

        .tagline {
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: -0.2px; /* Slogan 间距更紧密 */
            opacity: 1;
            margin-top: 25px;
            padding-left: 5px;
        }

        /* 3. 底部信息栏：精准还原吸色 */
        footer {
            background-color: #1c1c4b; /* 深蓝色底 */
            padding: 35px 15%;
            text-align: left;
            color: #a9b8d2; /* 浅蓝色字 */
            font-size: 0.85rem;
            line-height: 2;
        }

        .legal-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #ffffff; /* 公司全称纯白 */
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .hero { padding-left: 10%; }
            footer { padding: 30px 10%; }
            h1 { font-size: 3.5rem; letter-spacing: -2px; }
            .bird { height: 60px; left: 32px; }
            .leaf { height: 20px; left: -12px; top: 28px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="brand-container">
            <img src="Leaves.png" alt="Leaf" class="leaf">
            <img src="Bird.png" alt="Bird" class="bird">
        </div>
        
        <h1>PollyPop Games</h1>
        <p class="tagline">INNOVATING THE FUTURE OF CASUAL GAMING</p>
    </div>

    <footer>
        <div class="legal-name">SHIJIAZHUANG RUFANG TECHNOLOGY CO., LTD.</div>
        <div class="contact-details">
            D-U-N-S: 699429736 &nbsp;&nbsp;&nbsp; Email: tabriswx@gmail.com
        </div>
    </footer>

</body>
</html>
